name: Menchino Android Store Build WF-2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '*.zip'
      - '.github/workflows/menchino-build-wf2.yml'

permissions:
  contents: write
  actions: write

concurrency:
  group: menchino-unity-wf2-${{ github.ref }}
  cancel-in-progress: true

env:
  UNITY_VERSION: 2022.3.62f1
  PROJECT_PATH: unity-project
  PACKAGE_NAME: mk.kadkhodai.menchino
  VERSION_NAME: 0.1.0
  VERSION_CODE: '2'

jobs:
  build-store-apks:
    if: github.actor != 'github-actions[bot]'
    name: WF-2 • Latest Unity ZIP • Bazaar + Myket
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout complete repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: true

      - name: Select latest valid Unity ZIP and extract project
        id: prepare
        shell: bash
        run: |
          set -Eeuo pipefail
          shopt -s nullglob
          rm -rf "$PROJECT_PATH" "$RUNNER_TEMP/menchino-zip-probe"
          mkdir -p "$PROJECT_PATH" "$RUNNER_TEMP/menchino-zip-probe"

          mapfile -t CANDIDATES < <(
            while IFS= read -r -d '' file; do
              case "$(basename "$file")" in
                *output*|*delivery*|*artifact*|*logs*|Unity_lic.zip|*keystore*.zip) continue ;;
              esac
              stamp="$(git log -1 --format=%ct -- "$file" 2>/dev/null || printf '0')"
              printf '%s\t%s\n' "$stamp" "$file"
            done < <(find . -maxdepth 1 -type f -name '*.zip' -print0)
          )

          if [ "${#CANDIDATES[@]}" -eq 0 ]; then
            echo "::error::هیچ ZIP کاندید در ریشه مخزن پیدا نشد."
            exit 10
          fi

          SELECTED_ZIP=""
          while IFS=$'\t' read -r _stamp zip_file; do
            [ -n "$zip_file" ] || continue
            probe="$RUNNER_TEMP/menchino-zip-probe/current"
            rm -rf "$probe"
            mkdir -p "$probe"
            if ! unzip -q "$zip_file" -d "$probe"; then
              echo "ZIP نامعتبر رد شد: $zip_file"
              continue
            fi
            project_version="$(find "$probe" -type f -path '*/ProjectSettings/ProjectVersion.txt' -print -quit)"
            if [ -n "$project_version" ]; then
              SELECTED_ZIP="${zip_file#./}"
              project_root="${project_version%/ProjectSettings/ProjectVersion.txt}"
              cp -a "$project_root"/. "$PROJECT_PATH"/
              break
            fi
          done < <(printf '%s\n' "${CANDIDATES[@]}" | sort -t $'\t' -k1,1nr -k2,2Vr)

          if [ -z "$SELECTED_ZIP" ]; then
            echo "::error::هیچ ZIP دارای ساختار معتبر پروژه Unity پیدا نشد."
            exit 11
          fi

          test -f "$PROJECT_PATH/ProjectSettings/ProjectVersion.txt"
          test -f "$PROJECT_PATH/Packages/manifest.json"
          test -f "$PROJECT_PATH/Assets/Scenes/Bootstrap.unity"
          test -f "$PROJECT_PATH/Assets/RoyalGame/Scripts/Editor/AndroidBuild.cs"
          grep -Fq "m_EditorVersion: $UNITY_VERSION" "$PROJECT_PATH/ProjectSettings/ProjectVersion.txt"
          grep -Fq "$PACKAGE_NAME" "$PROJECT_PATH/Assets/RoyalGame/Scripts/Editor/AndroidBuild.cs"

          printf 'source_zip=%s\n' "$SELECTED_ZIP" >> "$GITHUB_OUTPUT"
          printf 'Selected source ZIP: %s\n' "$SELECTED_ZIP"
          printf 'Unity project: %s\n' "$PROJECT_PATH"

      - name: Validate embedded Unity credentials and Android signing
        shell: bash
        run: |
          set -Eeuo pipefail
          CREDS="$PROJECT_PATH/BuildCredentials/Unity/unity_credentials.env"
          LICENSE="$PROJECT_PATH/BuildCredentials/Unity/Unity_lic.ulf"
          SIGNING="$PROJECT_PATH/BuildCredentials/AndroidSigning/key.properties"
          test -s "$CREDS"
          test -s "$LICENSE"
          test -s "$SIGNING"
          set -a
          # shellcheck disable=SC1090
          source "$CREDS"
          set +a
          test -n "${UNITY_EMAIL:-}"
          test -n "${UNITY_PASSWORD:-}"
          echo "::add-mask::$UNITY_EMAIL"
          echo "::add-mask::$UNITY_PASSWORD"
          printf 'UNITY_EMAIL=%s\n' "$UNITY_EMAIL" >> "$GITHUB_ENV"
          printf 'UNITY_PASSWORD=%s\n' "$UNITY_PASSWORD" >> "$GITHUB_ENV"
          delimiter="UNITY_LICENSE_$(date +%s)_$RANDOM"
          {
            printf 'UNITY_LICENSE<<%s\n' "$delimiter"
            cat "$LICENSE"
            printf '\n%s\n' "$delimiter"
          } >> "$GITHUB_ENV"

          STORE_PASSWORD="$(awk -F= '$1=="storePassword"{sub(/^[^=]*=/,""); print}' "$SIGNING")"
          KEY_PASSWORD="$(awk -F= '$1=="keyPassword"{sub(/^[^=]*=/,""); print}' "$SIGNING")"
          KEY_ALIAS="$(awk -F= '$1=="keyAlias"{sub(/^[^=]*=/,""); print}' "$SIGNING")"
          STORE_FILE="$(awk -F= '$1=="storeFile"{sub(/^[^=]*=/,""); print}' "$SIGNING")"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_PASSWORD"
          test -n "$KEY_ALIAS"
          test -s "$PROJECT_PATH/BuildCredentials/AndroidSigning/$STORE_FILE"
          echo "::add-mask::$STORE_PASSWORD"
          echo "::add-mask::$KEY_PASSWORD"
          keytool -list -keystore "$PROJECT_PATH/BuildCredentials/AndroidSigning/$STORE_FILE" -storepass "$STORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null
          echo "Unity credentials, license XML and release keystore passed preflight."

      - name: Restore Unity Library cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: menchino-unity-${{ env.UNITY_VERSION }}-wf2-${{ hashFiles('unity-project/Packages/**', 'unity-project/ProjectSettings/**', 'unity-project/Assets/**/*.cs') }}
          restore-keys: |
            menchino-unity-${{ env.UNITY_VERSION }}-wf2-

      - name: Run Unity EditMode tests
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: EditMode
          artifactsPath: TestResults
          checkName: Menchino EditMode Tests WF-2

      - name: Build signed Bazaar APK
        uses: game-ci/unity-builder@v4
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          buildMethod: Menchino.RoyalSnakes.Editor.AndroidBuild.BuildBazaar
          androidExportType: androidPackage

      - name: Build signed Myket APK
        uses: game-ci/unity-builder@v4
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          buildMethod: Menchino.RoyalSnakes.Editor.AndroidBuild.BuildMyket
          androidExportType: androidPackage

      - name: Verify exactly two signed store APKs
        id: verify
        shell: bash
        run: |
          set -Eeuo pipefail
          BAZAAR="$PROJECT_PATH/Build/Menchino-v${VERSION_NAME}-build${VERSION_CODE}-bazaar.apk"
          MYKET="$PROJECT_PATH/Build/Menchino-v${VERSION_NAME}-build${VERSION_CODE}-myket.apk"
          test -s "$BAZAAR"
          test -s "$MYKET"

          mapfile -t APKS < <(find "$PROJECT_PATH/Build" -maxdepth 1 -type f -name '*.apk' -print | sort)
          if [ "${#APKS[@]}" -ne 2 ]; then
            printf 'Expected exactly 2 APKs, found %s:\n' "${#APKS[@]}" >&2
            printf ' - %s\n' "${APKS[@]}" >&2
            exit 30
          fi

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner -print | sort -V | tail -n 1)"
          AAPT="$(find "$ANDROID_HOME/build-tools" -type f -name aapt -print | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          test -x "$AAPT"

          for apk in "$BAZAAR" "$MYKET"; do
            unzip -tq "$apk" >/dev/null
            "$APKSIGNER" verify --verbose --print-certs "$apk" > "${apk%.apk}.signature.txt"
            "$AAPT" dump badging "$apk" > "${apk%.apk}.badging.txt"
            grep -Fq "package: name='$PACKAGE_NAME'" "${apk%.apk}.badging.txt"
            grep -Fq "versionCode='$VERSION_CODE'" "${apk%.apk}.badging.txt"
          done

          if cmp -s "$BAZAAR" "$MYKET"; then
            echo "::error::دو APK کاملاً یکسان هستند؛ تفکیک کانال فروشگاه اعمال نشده است."
            exit 31
          fi

          mkdir -p verified-output
          cp "$BAZAAR" "$MYKET" verified-output/
          (cd verified-output && sha256sum *.apk > SHA256SUMS.txt)
          test "$(find verified-output -maxdepth 1 -type f -name '*.apk' | wc -l)" -eq 2

      - name: Remove prior GitHub outputs and rewrite repository as one clean snapshot
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_ZIP: ${{ steps.prepare.outputs.source_zip }}
        shell: bash
        run: |
          set -Eeuo pipefail
          PUBLISH="$RUNNER_TEMP/menchino-clean-snapshot"
          rm -rf "$PUBLISH"
          mkdir -p "$PUBLISH/.github/workflows" "$PUBLISH/output"

          cp "$SOURCE_ZIP" "$PUBLISH/$(basename "$SOURCE_ZIP")"
          cp ".github/workflows/menchino-build-wf2.yml" "$PUBLISH/.github/workflows/menchino-build-wf2.yml"
          cp verified-output/*.apk "$PUBLISH/output/"
          test "$(find "$PUBLISH/output" -maxdepth 1 -type f -name '*.apk' | wc -l)" -eq 2

          # Delete previous Actions artifacts.
          mapfile -t artifact_ids < <(gh api --paginate "repos/$GITHUB_REPOSITORY/actions/artifacts?per_page=100" --jq '.artifacts[].id' || true)
          for id in "${artifact_ids[@]:-}"; do
            [ -n "$id" ] && gh api -X DELETE "repos/$GITHUB_REPOSITORY/actions/artifacts/$id"
          done

          # Delete previous workflow runs, except the currently executing run.
          mapfile -t run_ids < <(gh api --paginate "repos/$GITHUB_REPOSITORY/actions/runs?per_page=100" --jq ".workflow_runs[] | select(.id != $GITHUB_RUN_ID) | .id" || true)
          for id in "${run_ids[@]:-}"; do
            [ -n "$id" ] && gh api -X DELETE "repos/$GITHUB_REPOSITORY/actions/runs/$id" || true
          done

          # Delete previous releases and tags.
          mapfile -t release_ids < <(gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" --jq '.[].id' || true)
          for id in "${release_ids[@]:-}"; do
            [ -n "$id" ] && gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/$id"
          done
          mapfile -t tags < <(git tag -l)
          for tag in "${tags[@]:-}"; do
            [ -n "$tag" ] && git push origin ":refs/tags/$tag"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan menchino-clean-snapshot
          git rm -rf . >/dev/null 2>&1 || true
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$PUBLISH"/. .
          git add -f .
          git commit -m "Menchino v${VERSION_NAME}+${VERSION_CODE} clean store outputs [skip ci]"
          git branch -M "$GITHUB_REF_NAME"
          git push --force origin "HEAD:$GITHUB_REF_NAME"

          echo "Repository branch was replaced by one orphan snapshot commit."
          echo "The output directory contains exactly the Bazaar and Myket APK files."

      - name: Collect complete failure diagnostics
        if: failure()
        shell: bash
        run: |
          set +e
          LOG_DIR="$RUNNER_TEMP/menchino-wf2-failure-logs"
          rm -rf "$LOG_DIR"
          mkdir -p "$LOG_DIR"
          {
            echo "Workflow: Menchino WF-2"
            echo "Run: $GITHUB_RUN_ID"
            echo "Commit: $GITHUB_SHA"
            echo "Branch: $GITHUB_REF_NAME"
            echo "UTC: $(date -u +%FT%TZ)"
            echo "Unity: $UNITY_VERSION"
            echo "Package: $PACKAGE_NAME"
            echo
            echo "Repository root files:"
            find . -maxdepth 2 -type f -printf '%p (%s bytes)\n' | sort
            echo
            echo "Unity project build files:"
            find "$PROJECT_PATH/Build" -maxdepth 2 -type f -printf '%p (%s bytes)\n' 2>/dev/null | sort
          } > "$LOG_DIR/failure-summary.txt" 2>&1

          find "$PROJECT_PATH" "$RUNNER_TEMP" -type f \
            \( -iname '*.log' -o -iname '*TestResults*.xml' -o -iname '*.txt' \) \
            -size -50M -print0 2>/dev/null | while IFS= read -r -d '' file; do
              safe="$(printf '%s' "$file" | sed 's#^/##; s#[/: ]#_#g')"
              cp "$file" "$LOG_DIR/$safe" 2>/dev/null || true
            done

          grep -RInE '(^|[^A-Za-z])(error|exception|failed|failure|fatal)([^A-Za-z]|$)' "$LOG_DIR" \
            > "$LOG_DIR/error-lines.txt" 2>/dev/null || true
          tar -czf "$GITHUB_WORKSPACE/menchino-wf2-failure-logs-${GITHUB_RUN_ID}.tar.gz" -C "$LOG_DIR" .

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: menchino-wf2-failure-logs-${{ github.run_id }}
          path: menchino-wf2-failure-logs-${{ github.run_id }}.tar.gz
          if-no-files-found: error
          retention-days: 7
