# Menchino Workflow Number: WF-15
# Signature: MENCHINO-WF15-20260718-R1
# Supersedes: WF-14
name: Menchino Android Build WF-15 Direct Unity Container
run-name: "Menchino WF-15 • Run ${{ github.run_number }} • ${{ github.ref_name }}"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '**/menchino_unity_v*.zip'
      - '.github/workflows/menchino-build-wf15.yml'

permissions:
  contents: read
  actions: write

concurrency:
  group: menchino-wf15-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKFLOW_NUMBER: WF-15
  WORKFLOW_SIGNATURE: MENCHINO-WF15-20260718-R1
  CI_ROOT: .menchino-ci
  PROJECT_DIR: .menchino-ci/project
  EXTRACT_DIR: .menchino-ci/extracted
  LOG_DIR: .menchino-ci/logs
  PACKAGE_DIR: .menchino-ci/package
  FINAL_ZIP: .menchino-ci/package/Menchino-Android-Latest.zip
  UNITY_IMAGE: unityci/editor:ubuntu-2022.3.62f1-android-3

jobs:
  build-android:
    name: WF-15 direct-container dual APK build
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          lfs: true
          clean: true
          persist-credentials: true

      - name: Bootstrap WF-15
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf "$CI_ROOT"
          mkdir -p "$LOG_DIR" "$PACKAGE_DIR" "$EXTRACT_DIR"
          printf '%s\n' 'bootstrap' > "$LOG_DIR/current-stage.txt"
          {
            echo "workflow_number=$WORKFLOW_NUMBER"
            echo "workflow_signature=$WORKFLOW_SIGNATURE"
            echo "workflow_file=.github/workflows/menchino-build-wf15.yml"
            echo "run_id=$GITHUB_RUN_ID"
            echo "run_number=$GITHUB_RUN_NUMBER"
            echo "repository=$GITHUB_REPOSITORY"
            echo "ref=$GITHUB_REF"
            echo "commit=$GITHUB_SHA"
            echo "started_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } | tee "$LOG_DIR/wf15-identity.txt"

          test -f .github/workflows/menchino-build-wf15.yml
          grep -Fq 'name: Menchino Android Build WF-15 Direct Unity Container' .github/workflows/menchino-build-wf15.yml
          grep -Fq 'WORKFLOW_SIGNATURE: MENCHINO-WF15-20260718-R1' .github/workflows/menchino-build-wf15.yml
          sha256sum .github/workflows/menchino-build-wf15.yml | tee "$LOG_DIR/wf15-workflow-sha256.txt"

      - name: Pull and verify Git LFS objects
        shell: bash
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'git-lfs' > "$LOG_DIR/current-stage.txt"
          git lfs install --local
          git lfs pull 2>&1 | tee "$LOG_DIR/git-lfs.log"
          if grep -RIl --exclude-dir=.git --exclude-dir=.menchino-ci \
              '^version https://git-lfs.github.com/spec/v1$' . > "$LOG_DIR/unresolved-lfs-pointers.txt"; then
            echo 'Unresolved Git LFS pointer files remain.' | tee -a "$LOG_DIR/git-lfs.log"
            cat "$LOG_DIR/unresolved-lfs-pointers.txt" | tee -a "$LOG_DIR/git-lfs.log"
            exit 21
          fi

      - name: Find latest valid Menchino Unity ZIP
        id: source
        shell: bash
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'select-source' > "$LOG_DIR/current-stage.txt"
          python3 - <<'PY' 2>&1 | tee "$LOG_DIR/source-selection.log"
          from __future__ import annotations

          import hashlib
          import json
          import os
          import re
          import subprocess
          import zipfile
          from pathlib import Path, PurePosixPath

          repo = Path('.').resolve()
          excluded = {'.git', '.menchino-ci', 'Library', 'Temp', 'Builds'}
          filename_rx = re.compile(r'(?i)^menchino_unity_v(\d+)\.(\d+)\.(\d+).*\.zip$')
          lfs_header = b'version https://git-lfs.github.com/spec/v1'

          def git_timestamp(path: Path) -> int:
              try:
                  result = subprocess.run(
                      ['git', 'log', '-1', '--format=%ct', '--', path.as_posix()],
                      check=True,
                      capture_output=True,
                      text=True,
                  )
                  return int(result.stdout.strip() or '0')
              except Exception:
                  return 0

          def unity_roots(names: list[str]) -> list[str]:
              normalized = {
                  name.replace('\\', '/').strip('/')
                  for name in names
                  if name and name.strip('/')
              }
              roots: set[str] = set()
              for name in normalized:
                  parts = PurePosixPath(name).parts
                  if len(parts) < 2 or parts[-2:] != ('Packages', 'manifest.json'):
                      continue
                  prefix = '/'.join(parts[:-2])
                  base = f'{prefix}/' if prefix else ''
                  has_project_version = f'{base}ProjectSettings/ProjectVersion.txt' in normalized
                  has_assets = any(
                      candidate == f'{base}Assets' or candidate.startswith(f'{base}Assets/')
                      for candidate in normalized
                  )
                  if has_project_version and has_assets:
                      roots.add(prefix)
              return sorted(roots)

          records: list[dict[str, object]] = []
          accepted: list[tuple[tuple[int, int, int], int, str, Path, str, str]] = []

          for archive in sorted(repo.rglob('*.zip'), key=lambda p: p.as_posix().lower()):
              relative = archive.relative_to(repo)
              if any(part in excluded for part in relative.parts):
                  continue

              record: dict[str, object] = {'path': relative.as_posix(), 'bytes': archive.stat().st_size}
              match = filename_rx.match(archive.name)
              if not match:
                  record.update(status='rejected', reason='filename_not_versioned_menchino_source')
                  records.append(record)
                  continue

              if archive.read_bytes()[:128].startswith(lfs_header):
                  record.update(status='rejected', reason='unresolved_git_lfs_pointer')
                  records.append(record)
                  continue

              try:
                  with zipfile.ZipFile(archive) as zf:
                      corrupt = zf.testzip()
                      if corrupt:
                          raise RuntimeError(f'corrupt_member:{corrupt}')
                      names = zf.namelist()
                      roots = unity_roots(names)
                      record['zip_member_count'] = len(names)
              except Exception as exc:
                  record.update(status='rejected', reason=f'invalid_zip:{exc}')
                  records.append(record)
                  continue

              if len(roots) != 1:
                  record.update(status='rejected', reason=f'unity_root_count:{len(roots)}', roots=roots)
                  records.append(record)
                  continue

              version = tuple(map(int, match.groups()))
              digest = hashlib.sha256(archive.read_bytes()).hexdigest()
              timestamp = git_timestamp(relative)
              root = roots[0]
              record.update(
                  status='accepted',
                  version='.'.join(map(str, version)),
                  unity_root=root,
                  git_timestamp=timestamp,
                  sha256=digest,
              )
              records.append(record)
              accepted.append((version, timestamp, relative.as_posix(), archive, root, digest))

          Path(os.environ['LOG_DIR'], 'zip-candidates.json').write_text(
              json.dumps(records, ensure_ascii=False, indent=2), encoding='utf-8'
          )
          print(json.dumps(records, ensure_ascii=False, indent=2))

          if not accepted:
              raise SystemExit('No valid versioned Menchino Unity source ZIP was found.')

          version, timestamp, relative_name, archive, root, digest = max(
              accepted, key=lambda item: (item[0], item[1], item[2])
          )
          version_text = '.'.join(map(str, version))
          env_text = (
              f'SOURCE_ZIP={relative_name}\n'
              f'SOURCE_VERSION={version_text}\n'
              f'SOURCE_UNITY_ROOT={root}\n'
              f'SOURCE_SHA256={digest}\n'
          )
          Path(os.environ['LOG_DIR'], 'source.env').write_text(env_text, encoding='utf-8')
          print(env_text, end='')
          PY

          source "$LOG_DIR/source.env"
          {
            echo "SOURCE_ZIP=$SOURCE_ZIP"
            echo "SOURCE_VERSION=$SOURCE_VERSION"
            echo "SOURCE_UNITY_ROOT=$SOURCE_UNITY_ROOT"
            echo "SOURCE_SHA256=$SOURCE_SHA256"
          } >> "$GITHUB_ENV"
          {
            echo "zip=$SOURCE_ZIP"
            echo "version=$SOURCE_VERSION"
            echo "root=$SOURCE_UNITY_ROOT"
            echo "sha256=$SOURCE_SHA256"
          } >> "$GITHUB_OUTPUT"

      - name: Extract selected Unity project safely
        shell: bash
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'extract-source' > "$LOG_DIR/current-stage.txt"
          rm -rf "$EXTRACT_DIR" "$PROJECT_DIR"
          mkdir -p "$EXTRACT_DIR"

          python3 - <<'PY' 2>&1 | tee "$LOG_DIR/extraction.log"
          from __future__ import annotations

          import os
          import shutil
          import stat
          import zipfile
          from pathlib import Path, PurePosixPath

          archive = Path(os.environ['SOURCE_ZIP'])
          extract_dir = Path(os.environ['EXTRACT_DIR'])
          project_dir = Path(os.environ['PROJECT_DIR'])
          expected_root = os.environ['SOURCE_UNITY_ROOT'].strip('/')

          with zipfile.ZipFile(archive) as zf:
              seen: set[str] = set()
              for info in zf.infolist():
                  raw = info.filename.replace('\\', '/')
                  path = PurePosixPath(raw)
                  if raw.startswith('/') or path.is_absolute() or '..' in path.parts:
                      raise SystemExit(f'Unsafe ZIP path: {raw}')
                  normalized = path.as_posix().rstrip('/')
                  if normalized in seen:
                      raise SystemExit(f'Duplicate ZIP member: {normalized}')
                  seen.add(normalized)
                  mode = info.external_attr >> 16
                  if stat.S_ISLNK(mode):
                      raise SystemExit(f'Symlink is not allowed: {raw}')
              zf.extractall(extract_dir)

          source_root = extract_dir / expected_root if expected_root else extract_dir
          required = [
              source_root / 'Assets',
              source_root / 'Packages' / 'manifest.json',
              source_root / 'ProjectSettings' / 'ProjectVersion.txt',
              source_root / '.unity-ci' / 'Unity_lic.ulf',
              source_root / '.unity-ci' / 'unity_credentials.env',
          ]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit('Missing required project paths: ' + ', '.join(missing))

          shutil.copytree(source_root, project_dir)
          print(f'project_source={source_root}')
          print(f'project_destination={project_dir}')
          print(f'project_file_count={sum(1 for p in project_dir.rglob("*") if p.is_file())}')
          PY

          {
            echo "source_zip=$SOURCE_ZIP"
            echo "source_version=$SOURCE_VERSION"
            echo "source_sha256=$SOURCE_SHA256"
            echo "unity_editor=$(sed -n 's/^m_EditorVersion: //p' "$PROJECT_DIR/ProjectSettings/ProjectVersion.txt")"
            echo "project_file_count=$(find "$PROJECT_DIR" -type f | wc -l)"
          } | tee "$LOG_DIR/project-validation.txt"

      - name: Prepare embedded activation files
        shell: bash
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'prepare-activation' > "$LOG_DIR/current-stage.txt"
          python3 - <<'PY'
          from __future__ import annotations

          import base64
          import hashlib
          import os
          import re
          import xml.etree.ElementTree as ET
          from pathlib import Path

          project = Path(os.environ['PROJECT_DIR'])
          logs = Path(os.environ['LOG_DIR'])
          license_path = project / '.unity-ci' / 'Unity_lic.ulf'
          credentials_path = project / '.unity-ci' / 'unity_credentials.env'
          runtime_env = Path(os.environ['CI_ROOT']) / 'runtime-unity.env'

          license_text = license_path.read_text(encoding='utf-8').strip()
          if len(license_text.encode('utf-8')) < 256:
              raise SystemExit('Embedded Unity license is unexpectedly small.')
          root = ET.fromstring(license_text)
          developer_data = root.find('.//DeveloperData')
          if developer_data is None or not developer_data.attrib.get('Value'):
              raise SystemExit('Unity license has no DeveloperData payload.')
          decoded = base64.b64decode(developer_data.attrib['Value']).decode('utf-8', errors='ignore')
          serial_match = re.search(r'[A-Z0-9]{2}(?:-[A-Z0-9]{4}){5}', decoded)
          if serial_match is None:
              raise SystemExit('Unity serial format could not be decoded.')
          serial = serial_match.group(0)

          credentials: dict[str, str] = {}
          for raw in credentials_path.read_text(encoding='utf-8').splitlines():
              line = raw.strip()
              if not line or line.startswith('#'):
                  continue
              if '=' not in line:
                  raise SystemExit('Malformed unity_credentials.env line.')
              key, value = line.split('=', 1)
              credentials[key.strip()] = value.strip()

          email = credentials.get('UNITY_EMAIL', '')
          password = credentials.get('UNITY_PASSWORD', '')
          if not email or not password:
              raise SystemExit('Embedded Unity credentials are incomplete.')
          if any('\n' in value or '\r' in value or '\x00' in value for value in (serial, email, password)):
              raise SystemExit('Activation values contain invalid control characters.')

          for protected in (serial, email, password):
              print(f'::add-mask::{protected}')

          runtime_env.write_text(
              f'UNITY_SERIAL={serial}\nUNITY_EMAIL={email}\nUNITY_PASSWORD={password}\n',
              encoding='utf-8',
          )
          runtime_env.chmod(0o600)

          (logs / 'activation-validation.txt').write_text(
              'workflow=WF-15\n'
              'activation_strategy=direct-ulf-import;direct-copy;online-fallback\n'
              'game_ci_builder_used=false\n'
              'github_unity_secrets_used=false\n'
              f'license_bytes={len(license_text.encode("utf-8"))}\n'
              f'license_sha256={hashlib.sha256(license_text.encode("utf-8")).hexdigest()}\n'
              f'serial_loaded=true;length={len(serial)}\n'
              f'email_loaded=true;length={len(email)}\n'
              f'password_loaded=true;length={len(password)}\n',
              encoding='utf-8',
          )
          PY
          test -s "$CI_ROOT/runtime-unity.env"
          test "$(stat -c '%a' "$CI_ROOT/runtime-unity.env")" = '600'

      - name: Pull pinned Unity Android image
        shell: bash
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'pull-unity-image' > "$LOG_DIR/current-stage.txt"
          docker pull "$UNITY_IMAGE" 2>&1 | tee "$LOG_DIR/docker-pull.log"
          docker image inspect "$UNITY_IMAGE" > "$LOG_DIR/docker-image-inspect.json"

      - name: Build exactly two APKs in direct Unity container
        id: unity_build
        shell: bash
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'direct-unity-container-build' > "$LOG_DIR/current-stage.txt"
          rm -rf "$PROJECT_DIR/Builds/Android" "$PROJECT_DIR/Builds/Logs" "$CI_ROOT/unity-home"
          mkdir -p "$PROJECT_DIR/Builds/Android" "$PROJECT_DIR/Builds/Logs" "$CI_ROOT/unity-home"

          cat > "$CI_ROOT/run-unity-wf15.sh" <<'BASH'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          UNITY_BIN=/opt/unity/Editor/Unity
          WORKSPACE=/github/workspace
          PROJECT="$WORKSPACE/.menchino-ci/project"
          LOGS="$WORKSPACE/.menchino-ci/logs"
          LICENSE="$PROJECT/.unity-ci/Unity_lic.ulf"
          LICENSE_HOME=/root/.local/share/unity3d/Unity

          mkdir -p "$LICENSE_HOME" "$LOGS" "$PROJECT/Builds/Android" "$PROJECT/Builds/Logs"
          cp "$LICENSE" "$LICENSE_HOME/Unity_lic.ulf"
          chmod 600 "$LICENSE_HOME/Unity_lic.ulf"

          run_unity() {
            local label="$1"
            shift
            echo "[WF-15] START $label $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            set +e
            xvfb-run -a "$UNITY_BIN" "$@"
            local code=$?
            set -e
            echo "[WF-15] END $label exit=$code $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            return "$code"
          }

          MANUAL_EXIT=0
          run_unity manual-license-import \
            -batchmode -nographics -quit -force-free \
            -manualLicenseFile "$LICENSE" \
            -logFile "$LOGS/unity-manual-license.log" || MANUAL_EXIT=$?
          echo "manual_license_exit=$MANUAL_EXIT" > "$LOGS/activation-attempts.txt"

          BUILD1_EXIT=0
          run_unity build-after-ulf \
            -batchmode -nographics -quit -force-free \
            -projectPath "$PROJECT" \
            -buildTarget Android \
            -executeMethod Menchino.Editor.AndroidBuilder.Build \
            -stackTraceLogType Full \
            -logFile "$LOGS/unity-build-ulf.log" || BUILD1_EXIT=$?
          echo "build_after_ulf_exit=$BUILD1_EXIT" >> "$LOGS/activation-attempts.txt"

          APK_COUNT=$(find "$PROJECT/Builds/Android" -maxdepth 1 -type f -name '*.apk' | wc -l | tr -d ' ')
          if [ "$BUILD1_EXIT" -eq 0 ] && [ "$APK_COUNT" -eq 2 ]; then
            echo 'activation_mode=embedded-ulf-direct' >> "$LOGS/activation-attempts.txt"
            exit 0
          fi

          LICENSE_PATTERN='No valid Unity Editor license|No valid license|License is not active|Failed to activate|Licensing.*(fail|error)|LICENSE SYSTEM.*(fail|error)|serial.*(invalid|failed)|entitlement.*(missing|failed)|Machine identification is invalid'
          NEED_ONLINE=false
          if grep -Eiq "$LICENSE_PATTERN" "$LOGS/unity-manual-license.log" "$LOGS/unity-build-ulf.log" 2>/dev/null; then
            NEED_ONLINE=true
          elif [ ! -s "$LOGS/unity-build-ulf.log" ]; then
            NEED_ONLINE=true
          fi
          echo "online_fallback_required=$NEED_ONLINE" >> "$LOGS/activation-attempts.txt"

          if [ "$NEED_ONLINE" != true ]; then
            echo 'activation_mode=ulf-build-reached-project-but-failed' >> "$LOGS/activation-attempts.txt"
            exit "$BUILD1_EXIT"
          fi

          ONLINE_EXIT=0
          run_unity online-personal-activation \
            -batchmode -nographics -quit \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD" \
            -serial "$UNITY_SERIAL" \
            -logFile "$LOGS/unity-online-activation.log" || ONLINE_EXIT=$?
          echo "online_activation_exit=$ONLINE_EXIT" >> "$LOGS/activation-attempts.txt"

          rm -rf "$PROJECT/Builds/Android" "$PROJECT/Builds/Logs"
          mkdir -p "$PROJECT/Builds/Android" "$PROJECT/Builds/Logs"

          BUILD2_EXIT=0
          run_unity build-after-online-activation \
            -batchmode -nographics -quit -force-free \
            -projectPath "$PROJECT" \
            -buildTarget Android \
            -executeMethod Menchino.Editor.AndroidBuilder.Build \
            -stackTraceLogType Full \
            -logFile "$LOGS/unity-build-online.log" || BUILD2_EXIT=$?
          echo "build_after_online_exit=$BUILD2_EXIT" >> "$LOGS/activation-attempts.txt"

          APK_COUNT=$(find "$PROJECT/Builds/Android" -maxdepth 1 -type f -name '*.apk' | wc -l | tr -d ' ')
          if [ "$BUILD2_EXIT" -eq 0 ] && [ "$APK_COUNT" -eq 2 ]; then
            echo 'activation_mode=online-fallback' >> "$LOGS/activation-attempts.txt"
            exit 0
          fi

          echo 'activation_mode=all-direct-paths-failed' >> "$LOGS/activation-attempts.txt"
          exit "$BUILD2_EXIT"
          BASH
          chmod +x "$CI_ROOT/run-unity-wf15.sh"

          set +e
          docker run --rm \
            --network host \
            --shm-size=2g \
            --env-file "$CI_ROOT/runtime-unity.env" \
            -e HOME=/root \
            -v "$GITHUB_WORKSPACE:/github/workspace" \
            -w /github/workspace \
            "$UNITY_IMAGE" \
            bash /github/workspace/.menchino-ci/run-unity-wf15.sh \
            2>&1 | tee "$LOG_DIR/direct-unity-container-console.log"
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          sudo chown -R "$(id -u):$(id -g)" "$CI_ROOT" 2>/dev/null || true
          echo "direct_container_exit=$BUILD_EXIT" | tee "$LOG_DIR/direct-container-outcome.txt"
          if [ "$BUILD_EXIT" -ne 0 ]; then
            exit "$BUILD_EXIT"
          fi

      - name: Verify APKs and create final ZIP
        id: package
        shell: bash
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'package-output' > "$LOG_DIR/current-stage.txt"
          ARM64_APK="$PROJECT_DIR/Builds/Android/Menchino-arm64-v8a.apk"
          UNIVERSAL_APK="$PROJECT_DIR/Builds/Android/Menchino-universal.apk"

          test -s "$ARM64_APK"
          test -s "$UNIVERSAL_APK"
          APK_COUNT=$(find "$PROJECT_DIR/Builds/Android" -maxdepth 1 -type f -name '*.apk' | wc -l | tr -d ' ')
          test "$APK_COUNT" -eq 2

          ARM64_SHA=$(sha256sum "$ARM64_APK" | awk '{print $1}')
          UNIVERSAL_SHA=$(sha256sum "$UNIVERSAL_APK" | awk '{print $1}')
          if [ "$ARM64_SHA" = "$UNIVERSAL_SHA" ]; then
            echo 'The two APK outputs are byte-identical; refusing to package duplicate files.' >&2
            exit 61
          fi

          rm -f "$FINAL_ZIP"
          (cd "$PROJECT_DIR/Builds/Android" && zip -q -0 "$GITHUB_WORKSPACE/$FINAL_ZIP" \
            Menchino-arm64-v8a.apk Menchino-universal.apk)

          python3 - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          final_zip = Path(os.environ['FINAL_ZIP'])
          with zipfile.ZipFile(final_zip) as zf:
              expected = ['Menchino-arm64-v8a.apk', 'Menchino-universal.apk']
              if zf.namelist() != expected:
                  raise SystemExit(f'Unexpected final ZIP entries: {zf.namelist()}')
              if zf.testzip() is not None:
                  raise SystemExit('Final ZIP integrity check failed.')
          PY

          sha256sum "$ARM64_APK" "$UNIVERSAL_APK" "$FINAL_ZIP" | tee "$LOG_DIR/output-sha256.txt"
          unzip -t "$FINAL_ZIP" | tee "$LOG_DIR/final-zip-test.txt"
          unzip -l "$FINAL_ZIP" | tee "$LOG_DIR/final-zip-contents.txt"

      - name: Upload final ZIP directly
        id: upload_success
        uses: actions/upload-artifact@v7.0.1
        with:
          path: .menchino-ci/package/Menchino-Android-Latest.zip
          archive: false
          if-no-files-found: error
          retention-days: 7

      - name: Delete previous Menchino artifacts and completed runs
        id: cleanup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_ARTIFACT_ID: ${{ steps.upload_success.outputs.artifact-id }}
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'cleanup-old-output' > "$LOG_DIR/current-stage.txt"
          : > "$LOG_DIR/cleanup.txt"

          gh api --paginate \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/actions/artifacts?per_page=100" \
            > "$LOG_DIR/artifacts-before-cleanup.json"

          python3 - "$CURRENT_ARTIFACT_ID" "$LOG_DIR/artifacts-before-cleanup.json" <<'PY' > "$LOG_DIR/old-artifact-ids.txt"
          import json
          import re
          import sys
          from pathlib import Path

          current = str(sys.argv[1] or '')
          data = json.loads(Path(sys.argv[2]).read_text(encoding='utf-8'))
          matcher = re.compile(r'(?i)(menchino|build-error-logs|Menchino-Android-Latest)')
          for artifact in data.get('artifacts', []):
              artifact_id = str(artifact.get('id', ''))
              if artifact_id != current and matcher.search(artifact.get('name', '')):
                  print(artifact_id)
          PY

          while IFS= read -r artifact_id; do
            [ -n "$artifact_id" ] || continue
            echo "delete_artifact=$artifact_id" | tee -a "$LOG_DIR/cleanup.txt"
            gh api --method DELETE \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id" >/dev/null
          done < "$LOG_DIR/old-artifact-ids.txt"

          gh api --paginate \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/actions/runs?status=completed&per_page=100" \
            > "$LOG_DIR/runs-before-cleanup.json"

          python3 - "$GITHUB_RUN_ID" "$LOG_DIR/runs-before-cleanup.json" <<'PY' > "$LOG_DIR/old-run-ids.txt"
          import json
          import re
          import sys
          from pathlib import Path

          current = int(sys.argv[1])
          data = json.loads(Path(sys.argv[2]).read_text(encoding='utf-8'))
          matcher = re.compile(r'(?i)(menchino|build[-_]?apk)')
          for run in data.get('workflow_runs', []):
              if run.get('id') == current:
                  continue
              if matcher.search(run.get('name', '')) or matcher.search(run.get('path', '')):
                  print(run['id'])
          PY

          while IFS= read -r run_id; do
            [ -n "$run_id" ] || continue
            echo "delete_run=$run_id" | tee -a "$LOG_DIR/cleanup.txt"
            gh api --method DELETE \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/actions/runs/$run_id" >/dev/null
          done < "$LOG_DIR/old-run-ids.txt"

      - name: Collect sanitized WF-15 failure logs
        if: ${{ always() && failure() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_ARTIFACT_ID: ${{ steps.upload_success.outputs.artifact-id }}
        run: |
          set +e
          if [ -n "${CURRENT_ARTIFACT_ID:-}" ]; then
            gh api --method DELETE \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/actions/artifacts/$CURRENT_ARTIFACT_ID" >/dev/null 2>&1 || true
          fi

          FAILURE_DIR="$CI_ROOT/failure-bundle"
          FAILURE_ZIP="$CI_ROOT/menchino-build-error-logs-wf15-run-${GITHUB_RUN_NUMBER}.zip"
          rm -rf "$FAILURE_DIR" "$FAILURE_ZIP"
          mkdir -p "$FAILURE_DIR"

          cp -a "$LOG_DIR"/. "$FAILURE_DIR"/ 2>/dev/null || true
          cp -a "$PROJECT_DIR/Builds/Logs" "$FAILURE_DIR/project-build-logs" 2>/dev/null || true
          cp -a "$PROJECT_DIR/Library/Logs" "$FAILURE_DIR/library-logs" 2>/dev/null || true
          find "$PROJECT_DIR" -type f \
            \( -name '*.log' -o -name '*build-report*.txt' -o -name '*build-report*.log' \
               -o -name 'gradle*.txt' -o -name 'build.gradle' -o -name 'settings.gradle' \) \
            -size -30M -print0 2>/dev/null \
            | while IFS= read -r -d '' file; do
                relative="${file#${PROJECT_DIR}/}"
                target="$FAILURE_DIR/discovered-project-logs/$relative"
                mkdir -p "$(dirname "$target")"
                cp -a "$file" "$target" 2>/dev/null || true
              done

          docker ps -a > "$FAILURE_DIR/docker-ps.txt" 2>&1 || true
          docker images > "$FAILURE_DIR/docker-images.txt" 2>&1 || true
          df -h > "$FAILURE_DIR/disk-usage.txt" 2>&1 || true

          {
            echo "workflow_number=$WORKFLOW_NUMBER"
            echo "workflow_signature=$WORKFLOW_SIGNATURE"
            echo "workflow=$GITHUB_WORKFLOW"
            echo "run_id=$GITHUB_RUN_ID"
            echo "run_number=$GITHUB_RUN_NUMBER"
            echo "source_zip=${SOURCE_ZIP:-not-selected}"
            echo "source_version=${SOURCE_VERSION:-unknown}"
            echo "unity_image=$UNITY_IMAGE"
            echo "unity_build_outcome=${{ steps.unity_build.outcome }}"
            echo "package_outcome=${{ steps.package.outcome }}"
            echo "cleanup_outcome=${{ steps.cleanup.outcome }}"
            echo "failed_stage=$(cat "$LOG_DIR/current-stage.txt" 2>/dev/null || echo unknown)"
            echo "failed_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > "$FAILURE_DIR/failure-summary.txt"

          python3 - <<'PY'
          from pathlib import Path

          root = Path('.menchino-ci/failure-bundle')
          protected = []
          env_file = Path('.menchino-ci/runtime-unity.env')
          if env_file.exists():
              for raw in env_file.read_text(encoding='utf-8', errors='replace').splitlines():
                  if '=' in raw:
                      protected.append(raw.split('=', 1)[1])
          license_path = Path('.menchino-ci/project/.unity-ci/Unity_lic.ulf')
          if license_path.exists():
              protected.append(license_path.read_text(encoding='utf-8', errors='replace').strip())

          for path in root.rglob('*'):
              if not path.is_file() or path.stat().st_size > 30_000_000:
                  continue
              try:
                  content = path.read_text(encoding='utf-8', errors='replace')
              except OSError:
                  continue
              for value in protected:
                  if value:
                      content = content.replace(value, '[REDACTED]')
              path.write_text(content, encoding='utf-8')
          PY

          rm -f "$FAILURE_DIR/runtime-unity.env" 2>/dev/null || true
          (cd "$FAILURE_DIR" && zip -q -r "$GITHUB_WORKSPACE/$FAILURE_ZIP" .)
          test -s "$FAILURE_ZIP"
          unzip -t "$FAILURE_ZIP"

      - name: Upload WF-15 error-log ZIP directly
        if: ${{ always() && failure() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          path: .menchino-ci/menchino-build-error-logs-wf15-run-${{ github.run_number }}.zip
          archive: false
          if-no-files-found: error
          retention-days: 7
