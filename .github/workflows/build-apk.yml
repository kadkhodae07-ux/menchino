# Menchino Workflow Number: WF-13
# Signature: MENCHINO-WF13-20260718-R1
# Supersedes: WF-12
name: Menchino Android Build WF-13
run-name: "Menchino WF-13 • Run ${{ github.run_number }} • ${{ github.ref_name }}"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '**/menchino_unity_v*.zip'
      - '.github/workflows/menchino-build-wf13.yml'

permissions:
  contents: read
  actions: write

concurrency:
  group: menchino-wf13-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKFLOW_NUMBER: WF-13
  WORKFLOW_SIGNATURE: MENCHINO-WF13-20260718-R1
  PROJECT_DIR: .menchino-ci/project
  EXTRACT_DIR: .menchino-ci/extracted
  LOG_DIR: .menchino-ci/logs
  PACKAGE_DIR: .menchino-ci/package
  FINAL_ZIP: .menchino-ci/package/Menchino-Android-Latest.zip

jobs:
  build-android:
    name: WF-13 build exactly two APKs
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true
          clean: true
          persist-credentials: true

      - name: Bootstrap and verify WF-13 identity
        id: workflow_identity
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf .menchino-ci
          mkdir -p "$LOG_DIR" "$PACKAGE_DIR"
          printf '%s\n' 'bootstrap-and-verify-workflow-identity' > "$LOG_DIR/current-stage.txt"

          python3 - <<'PY' 2>&1 | tee "$LOG_DIR/wf13-identity.log"
          from __future__ import annotations

          import hashlib
          import json
          import os
          from pathlib import Path

          workflows_dir = Path('.github/workflows')
          expected_name = 'name: Menchino Android Build WF-13'
          expected_signature = 'WORKFLOW_SIGNATURE: MENCHINO-WF13-20260718-R1'
          candidates = []

          for path in sorted([*workflows_dir.glob('*.yml'), *workflows_dir.glob('*.yaml')]):
              text = path.read_text(encoding='utf-8', errors='replace')
              has_name = expected_name in text
              has_signature = expected_signature in text
              candidates.append({
                  'path': path.as_posix(),
                  'has_expected_name': has_name,
                  'has_expected_signature': has_signature,
                  'sha256': hashlib.sha256(path.read_bytes()).hexdigest(),
              })

          Path(os.environ['LOG_DIR'], 'workflow-candidates.json').write_text(
              json.dumps(candidates, ensure_ascii=False, indent=2),
              encoding='utf-8',
          )
          print(json.dumps(candidates, ensure_ascii=False, indent=2))

          matches = [item for item in candidates if item['has_expected_name'] and item['has_expected_signature']]
          if len(matches) != 1:
              raise SystemExit(
                  f'WF-13 identity check expected exactly one matching workflow file, found {len(matches)}. '
                  'The file may use any .yml/.yaml filename, but its internal WF-13 name and signature must be intact.'
              )

          selected = matches[0]
          workflow_path = selected['path']
          workflow_sha = selected['sha256']
          print(f'ACTIVE_WORKFLOW_FILE={workflow_path}')
          print(f'ACTIVE_WORKFLOW_SHA256={workflow_sha}')

          env_path = Path(os.environ['LOG_DIR'], 'workflow-selection.env')
          env_path.write_text(
              f'ACTIVE_WORKFLOW_FILE={workflow_path}\n'
              f'ACTIVE_WORKFLOW_SHA256={workflow_sha}\n',
              encoding='utf-8',
          )
          PY

          source "$LOG_DIR/workflow-selection.env"
          {
            echo "ACTIVE_WORKFLOW_FILE=$ACTIVE_WORKFLOW_FILE"
            echo "ACTIVE_WORKFLOW_SHA256=$ACTIVE_WORKFLOW_SHA256"
          } >> "$GITHUB_ENV"

          {
            echo "workflow_number=$WORKFLOW_NUMBER"
            echo "workflow_signature=$WORKFLOW_SIGNATURE"
            echo "workflow_file=$ACTIVE_WORKFLOW_FILE"
            echo "workflow_sha256=$ACTIVE_WORKFLOW_SHA256"
            echo "run_id=$GITHUB_RUN_ID"
            echo "run_number=$GITHUB_RUN_NUMBER"
            echo "repository=$GITHUB_REPOSITORY"
            echo "ref=$GITHUB_REF"
            echo "commit=$GITHUB_SHA"
            echo "started_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } | tee "$LOG_DIR/wf13-identity.txt"

      - name: Pull and verify Git LFS objects
        shell: bash
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'pull-and-verify-git-lfs' > "$LOG_DIR/current-stage.txt"
          if git lfs version >/dev/null 2>&1; then
            git lfs install --local
            git lfs pull 2>&1 | tee "$LOG_DIR/git-lfs.log"
          else
            echo 'git-lfs is not installed on this runner.' | tee "$LOG_DIR/git-lfs.log"
            exit 20
          fi

          if grep -RIl --exclude-dir=.git --exclude-dir=.menchino-ci \
              '^version https://git-lfs.github.com/spec/v1$' . > "$LOG_DIR/unresolved-lfs-pointers.txt"; then
            echo 'Unresolved Git LFS pointer files remain after checkout/pull:' | tee -a "$LOG_DIR/git-lfs.log"
            cat "$LOG_DIR/unresolved-lfs-pointers.txt" | tee -a "$LOG_DIR/git-lfs.log"
            exit 21
          fi

      - name: Find and validate latest Menchino source ZIP
        id: source
        shell: bash
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'select-latest-source-zip' > "$LOG_DIR/current-stage.txt"

          python3 - <<'PY' 2>&1 | tee "$LOG_DIR/source-selection.log"
          from __future__ import annotations

          import hashlib
          import json
          import os
          import re
          import subprocess
          import zipfile
          from pathlib import Path, PurePosixPath

          repository = Path('.').resolve()
          excluded_parts = {'.git', '.menchino-ci', 'Library', 'Temp', 'Builds'}
          pattern = re.compile(r'(?i)^menchino_unity_v(\d+)\.(\d+)\.(\d+).*\.zip$')
          lfs_header = b'version https://git-lfs.github.com/spec/v1'

          def git_timestamp(relative: Path) -> int:
              try:
                  result = subprocess.run(
                      ['git', 'log', '-1', '--format=%ct', '--', relative.as_posix()],
                      check=True,
                      capture_output=True,
                      text=True,
                  )
                  return int(result.stdout.strip() or '0')
              except Exception:
                  return 0

          def detect_unity_roots(names: list[str]) -> list[str]:
              # ZIP creators are not required to emit explicit directory entries.
              # Detect Assets by file-path prefix instead of requiring an exact
              # "Assets" member, which incorrectly rejected valid source ZIPs.
              normalized = {
                  name.replace('\\', '/').strip('/')
                  for name in names
                  if name and name.strip('/')
              }
              roots: set[str] = set()
              for name in normalized:
                  parts = PurePosixPath(name).parts
                  if len(parts) < 2 or parts[-2:] != ('Packages', 'manifest.json'):
                      continue

                  prefix = '/'.join(parts[:-2])
                  base = f'{prefix}/' if prefix else ''
                  project_version = f'{base}ProjectSettings/ProjectVersion.txt'
                  assets_prefix = f'{base}Assets/'
                  has_assets_content = any(
                      candidate == f'{base}Assets' or candidate.startswith(assets_prefix)
                      for candidate in normalized
                  )

                  if project_version in normalized and has_assets_content:
                      roots.add(prefix)
              return sorted(roots)

          records: list[dict[str, object]] = []
          valid: list[tuple[tuple[int, int, int], int, str, Path, str, str]] = []

          for archive in sorted(repository.rglob('*.zip'), key=lambda item: item.as_posix().lower()):
              relative = archive.relative_to(repository)
              if any(part in excluded_parts for part in relative.parts):
                  continue

              record: dict[str, object] = {
                  'path': relative.as_posix(),
                  'bytes': archive.stat().st_size,
              }
              filename_match = pattern.match(archive.name)
              if not filename_match:
                  record['status'] = 'rejected'
                  record['reason'] = 'filename_not_menchino_versioned_source'
                  records.append(record)
                  continue

              with archive.open('rb') as stream:
                  if stream.read(128).startswith(lfs_header):
                      record['status'] = 'rejected'
                      record['reason'] = 'unresolved_git_lfs_pointer'
                      records.append(record)
                      continue

              try:
                  with zipfile.ZipFile(archive) as bundle:
                      corrupt_member = bundle.testzip()
                      if corrupt_member:
                          raise RuntimeError(f'corrupt_member:{corrupt_member}')
                      member_names = bundle.namelist()
                      roots = detect_unity_roots(member_names)
                      record['zip_member_count'] = len(member_names)
              except Exception as error:
                  record['status'] = 'rejected'
                  record['reason'] = f'invalid_zip:{error}'
                  records.append(record)
                  continue

              if len(roots) != 1:
                  record['status'] = 'rejected'
                  record['reason'] = f'unity_root_count:{len(roots)}'
                  record['roots'] = roots
                  records.append(record)
                  continue

              version = tuple(int(value) for value in filename_match.groups())
              digest = hashlib.sha256(archive.read_bytes()).hexdigest()
              timestamp = git_timestamp(relative)
              record.update({
                  'status': 'accepted',
                  'version': '.'.join(map(str, version)),
                  'unity_root': roots[0] or '.',
                  'git_timestamp': timestamp,
                  'sha256': digest,
              })
              records.append(record)
              valid.append((version, timestamp, relative.as_posix().lower(), archive, roots[0], digest))

          print(json.dumps(records, ensure_ascii=False, indent=2))
          Path(os.environ['LOG_DIR'], 'zip-candidates.json').write_text(
              json.dumps(records, ensure_ascii=False, indent=2),
              encoding='utf-8',
          )

          if not valid:
              raise SystemExit('No valid menchino_unity_vX.Y.Z*.zip source archive was found.')

          version, timestamp, _, selected, unity_root, digest = max(
              valid,
              key=lambda item: (item[0], item[1], item[2]),
          )
          relative = selected.relative_to(repository).as_posix()
          version_text = '.'.join(map(str, version))

          print(f'SELECTED_ZIP={relative}')
          print(f'SELECTED_VERSION={version_text}')
          print(f'SELECTED_UNITY_ROOT={unity_root or "."}')
          print(f'SELECTED_SHA256={digest}')

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as output:
              output.write(f'SOURCE_ZIP={relative}\n')
              output.write(f'SOURCE_VERSION={version_text}\n')
              output.write(f'SOURCE_ROOT={unity_root}\n')
              output.write(f'SOURCE_SHA256={digest}\n')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'zip={relative}\n')
              output.write(f'version={version_text}\n')
              output.write(f'sha256={digest}\n')
          PY

      - name: Extract selected Unity project safely
        shell: bash
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'extract-and-validate-unity-project' > "$LOG_DIR/current-stage.txt"
          rm -rf "$EXTRACT_DIR" "$PROJECT_DIR"
          mkdir -p "$EXTRACT_DIR" "$PROJECT_DIR"

          python3 - <<'PY'
          from __future__ import annotations

          import os
          import shutil
          import zipfile
          from pathlib import Path

          source_zip = Path(os.environ['SOURCE_ZIP'])
          extract_dir = Path(os.environ['EXTRACT_DIR'])
          project_dir = Path(os.environ['PROJECT_DIR'])
          source_root = os.environ.get('SOURCE_ROOT', '')

          with zipfile.ZipFile(source_zip) as archive:
              resolved_extract = extract_dir.resolve()
              for member in archive.infolist():
                  destination = (extract_dir / member.filename).resolve()
                  if destination != resolved_extract and resolved_extract not in destination.parents:
                      raise SystemExit(f'Unsafe ZIP entry: {member.filename}')
              archive.extractall(extract_dir)

          unity_root = extract_dir / source_root if source_root else extract_dir
          required = ['Assets', 'Packages', 'ProjectSettings', '.unity-ci']
          missing = [name for name in required if not (unity_root / name).exists()]
          if missing:
              raise SystemExit(f'Unity source is incomplete. Missing: {missing}')

          for item in unity_root.iterdir():
              target = project_dir / item.name
              if item.is_dir():
                  shutil.copytree(item, target, dirs_exist_ok=True)
              else:
                  shutil.copy2(item, target)
          PY

          test -s "$PROJECT_DIR/Packages/manifest.json"
          test -s "$PROJECT_DIR/ProjectSettings/ProjectVersion.txt"
          test -s "$PROJECT_DIR/.unity-ci/Unity_lic.ulf"
          test -s "$PROJECT_DIR/.unity-ci/unity_credentials.env"
          test -s "$PROJECT_DIR/Assets/Editor/MenchinoBuildConfigurator.cs"
          test -s "$PROJECT_DIR/Assets/Scripts/Menchino.Runtime.asmdef"
          grep -Fq 'public static void Build()' "$PROJECT_DIR/Assets/Editor/MenchinoBuildConfigurator.cs"
          grep -Fq 'Menchino-arm64-v8a.apk' "$PROJECT_DIR/Assets/Editor/MenchinoBuildConfigurator.cs"
          grep -Fq 'Menchino-universal.apk' "$PROJECT_DIR/Assets/Editor/MenchinoBuildConfigurator.cs"
          grep -Fq 'com.unity.ugui' "$PROJECT_DIR/Packages/manifest.json"
          grep -Fq 'Unity.ugui' "$PROJECT_DIR/Assets/Scripts/Menchino.Runtime.asmdef"
          if grep -Fq 'UnityEngine.Rendering.Universal' "$PROJECT_DIR/Assets/Editor/MenchinoBuildConfigurator.cs"; then
            echo 'The obsolete runtime-generated URP build configuration is still present.' >&2
            exit 32
          fi

          {
            echo "source_zip=$SOURCE_ZIP"
            echo "source_version=$SOURCE_VERSION"
            echo "source_sha256=$SOURCE_SHA256"
            echo "unity_editor=$(sed -n 's/^m_EditorVersion: //p' "$PROJECT_DIR/ProjectSettings/ProjectVersion.txt")"
            echo "project_file_count=$(find "$PROJECT_DIR" -type f | wc -l)"
          } | tee "$LOG_DIR/project-validation.txt"

      - name: Load embedded Unity activation data
        shell: bash
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'load-embedded-unity-activation' > "$LOG_DIR/current-stage.txt"

          python3 - <<'PY'
          from __future__ import annotations

          import hashlib
          import os
          import secrets
          import xml.etree.ElementTree as ET
          from pathlib import Path

          project = Path(os.environ['PROJECT_DIR'])
          license_path = project / '.unity-ci' / 'Unity_lic.ulf'
          credentials_path = project / '.unity-ci' / 'unity_credentials.env'

          license_text = license_path.read_text(encoding='utf-8').strip()
          if len(license_text.encode('utf-8')) < 256:
              raise SystemExit('Embedded Unity license file is unexpectedly small.')
          ET.fromstring(license_text)

          credentials: dict[str, str] = {}
          for raw_line in credentials_path.read_text(encoding='utf-8').splitlines():
              line = raw_line.strip()
              if not line or line.startswith('#'):
                  continue
              if '=' not in line:
                  raise SystemExit('Malformed line in unity_credentials.env.')
              key, value = line.split('=', 1)
              credentials[key.strip()] = value.strip()

          email = credentials.get('UNITY_EMAIL', '')
          password = credentials.get('UNITY_PASSWORD', '')
          if not email or not password:
              raise SystemExit('Embedded UNITY_EMAIL or UNITY_PASSWORD is empty.')

          print(f'::add-mask::{email}')
          print(f'::add-mask::{password}')

          env_file = Path(os.environ['GITHUB_ENV'])
          with env_file.open('a', encoding='utf-8') as output:
              for key, value in (
                  ('UNITY_LICENSE', license_text),
                  ('UNITY_EMAIL', email),
                  ('UNITY_PASSWORD', password),
              ):
                  delimiter = f'MENCHINO_{key}_{secrets.token_hex(16)}'
                  output.write(f'{key}<<{delimiter}\n{value}\n{delimiter}\n')

          Path(os.environ['LOG_DIR'], 'activation-validation.txt').write_text(
              'workflow=WF-13\n'
              'license_xml=valid\n'
              f'license_bytes={len(license_text.encode("utf-8"))}\n'
              f'license_sha256={hashlib.sha256(license_text.encode("utf-8")).hexdigest()}\n'
              f'email_loaded=true;length={len(email)}\n'
              f'password_loaded=true;length={len(password)}\n'
              'github_unity_secrets_used=false\n',
              encoding='utf-8',
          )
          PY

      - name: Confirm activation environment
        shell: bash
        run: |
          set -Eeuo pipefail
          test -n "${UNITY_LICENSE:-}"
          test -n "${UNITY_EMAIL:-}"
          test -n "${UNITY_PASSWORD:-}"
          echo 'WF-13 activation variables are available to Unity Builder.' | tee -a "$LOG_DIR/activation-validation.txt"

      - name: Prepare WF-13 Unity build diagnostics
        shell: bash
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'unity-build' > "$LOG_DIR/current-stage.txt"
          rm -rf "$PROJECT_DIR/Builds/Android" "$PROJECT_DIR/Builds/Logs"
          mkdir -p "$PROJECT_DIR/Builds/Android" "$PROJECT_DIR/Builds/Logs"

      - name: Build arm64 and universal APKs
        id: unity_build
        continue-on-error: true
        uses: game-ci/unity-builder@v5
        with:
          projectPath: .menchino-ci/project
          unityVersion: auto
          targetPlatform: Android
          buildMethod: Menchino.Editor.AndroidBuilder.Build
          androidExportType: androidPackage
          versioning: "None"
          allowDirtyBuild: true
          customParameters: >-
            -stackTraceLogType Full

      - name: Verify APKs and create final ZIP
        id: package
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ "${{ steps.unity_build.outcome }}" != 'success' ]; then
            printf '%s\n' 'unity-build-failed' > "$LOG_DIR/current-stage.txt"
            echo "Unity Builder outcome=${{ steps.unity_build.outcome }}" | tee "$LOG_DIR/unity-builder-outcome.txt"
            find "$PROJECT_DIR/Builds/Logs" -maxdepth 2 -type f -printf '%p %s bytes\n' 2>/dev/null \
              | sort | tee "$LOG_DIR/unity-project-log-files.txt" || true
            exit 51
          fi

          printf '%s\n' 'verify-and-package-apks' > "$LOG_DIR/current-stage.txt"

          BUILD_DIR="$PROJECT_DIR/Builds/Android"
          ARM64_APK="$BUILD_DIR/Menchino-arm64-v8a.apk"
          UNIVERSAL_APK="$BUILD_DIR/Menchino-universal.apk"

          test -s "$ARM64_APK"
          test -s "$UNIVERSAL_APK"

          mapfile -t APK_FILES < <(find "$BUILD_DIR" -maxdepth 1 -type f -name '*.apk' -print | sort)
          if [ "${#APK_FILES[@]}" -ne 2 ]; then
            printf 'Expected exactly 2 APK files, found %s\n' "${#APK_FILES[@]}" | tee "$LOG_DIR/apk-count-error.txt"
            printf '%s\n' "${APK_FILES[@]:-<none>}" | tee -a "$LOG_DIR/apk-count-error.txt"
            exit 52
          fi

          if cmp -s "$ARM64_APK" "$UNIVERSAL_APK"; then
            echo 'The two APK files are byte-identical; separate real builds were expected.' | tee "$LOG_DIR/apk-identity-error.txt"
            exit 53
          fi

          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"

          python3 - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          project = Path(os.environ['PROJECT_DIR'])
          final_zip = Path(os.environ['FINAL_ZIP'])
          apk_files = [
              project / 'Builds/Android/Menchino-arm64-v8a.apk',
              project / 'Builds/Android/Menchino-universal.apk',
          ]

          with zipfile.ZipFile(final_zip, 'w', compression=zipfile.ZIP_STORED) as output:
              for apk in apk_files:
                  output.write(apk, apk.name)

          with zipfile.ZipFile(final_zip) as output:
              expected = ['Menchino-arm64-v8a.apk', 'Menchino-universal.apk']
              if output.namelist() != expected:
                  raise SystemExit(f'Unexpected final ZIP entries: {output.namelist()}')
              if output.testzip() is not None:
                  raise SystemExit('Final ZIP integrity test failed.')
          PY

          sha256sum "$ARM64_APK" "$UNIVERSAL_APK" "$FINAL_ZIP" | tee "$LOG_DIR/output-sha256.txt"
          unzip -t "$FINAL_ZIP" | tee "$LOG_DIR/final-zip-test.txt"
          unzip -l "$FINAL_ZIP" | tee "$LOG_DIR/final-zip-contents.txt"

      - name: Upload final ZIP directly
        id: upload_success
        if: steps.unity_build.outcome == 'success' && steps.package.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          path: .menchino-ci/package/Menchino-Android-Latest.zip
          archive: false
          if-no-files-found: error
          retention-days: 7

      - name: Delete previous Menchino artifacts and completed runs
        id: cleanup
        if: steps.unity_build.outcome == 'success' && steps.package.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_ARTIFACT_ID: ${{ steps.upload_success.outputs.artifact-id }}
        run: |
          set -Eeuo pipefail
          printf '%s\n' 'cleanup-old-artifacts-and-runs' > "$LOG_DIR/current-stage.txt"
          : > "$LOG_DIR/cleanup.txt"

          gh api --paginate \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/actions/artifacts?per_page=100" \
            > "$LOG_DIR/artifacts-before-cleanup.json"

          python3 - "$CURRENT_ARTIFACT_ID" "$LOG_DIR/artifacts-before-cleanup.json" <<'PY' > "$LOG_DIR/old-artifact-ids.txt"
          import json
          import re
          import sys
          from pathlib import Path

          current = str(sys.argv[1] or '')
          data = json.loads(Path(sys.argv[2]).read_text(encoding='utf-8'))
          matcher = re.compile(r'(?i)^menchino(?:-|_)|Menchino-Android-Latest\.zip')
          for artifact in data.get('artifacts', []):
              artifact_id = str(artifact.get('id', ''))
              if artifact_id == current:
                  continue
              if matcher.search(artifact.get('name', '')):
                  print(artifact_id)
          PY

          while IFS= read -r artifact_id; do
            [ -n "$artifact_id" ] || continue
            echo "delete_artifact=$artifact_id" | tee -a "$LOG_DIR/cleanup.txt"
            gh api --method DELETE \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id" >/dev/null
          done < "$LOG_DIR/old-artifact-ids.txt"

          gh api --paginate \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/actions/runs?status=completed&per_page=100" \
            > "$LOG_DIR/runs-before-cleanup.json"

          python3 - "$GITHUB_RUN_ID" "$LOG_DIR/runs-before-cleanup.json" <<'PY' > "$LOG_DIR/old-run-ids.txt"
          import json
          import re
          import sys
          from pathlib import Path

          current = int(sys.argv[1])
          data = json.loads(Path(sys.argv[2]).read_text(encoding='utf-8'))
          matcher = re.compile(r'(?i)(menchino|build[-_]?apk)')
          for run in data.get('workflow_runs', []):
              if run.get('id') == current:
                  continue
              if matcher.search(run.get('name', '')) or matcher.search(run.get('path', '')):
                  print(run['id'])
          PY

          while IFS= read -r run_id; do
            [ -n "$run_id" ] || continue
            echo "delete_run=$run_id" | tee -a "$LOG_DIR/cleanup.txt"
            gh api --method DELETE \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/actions/runs/$run_id" >/dev/null
          done < "$LOG_DIR/old-run-ids.txt"

      - name: Collect sanitized failure logs
        if: ${{ always() && (failure() || steps.unity_build.outcome != 'success' || steps.package.outcome != 'success') }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_ARTIFACT_ID: ${{ steps.upload_success.outputs.artifact-id }}
        run: |
          set +e

          if [ -n "${CURRENT_ARTIFACT_ID:-}" ]; then
            gh api --method DELETE \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/actions/artifacts/$CURRENT_ARTIFACT_ID" >/dev/null 2>&1 || true
          fi

          FAILURE_DIR=".menchino-ci/failure-bundle"
          FAILURE_ZIP=".menchino-ci/menchino-build-error-logs-wf13-run-${GITHUB_RUN_NUMBER}.zip"
          rm -rf "$FAILURE_DIR" "$FAILURE_ZIP"
          mkdir -p "$FAILURE_DIR"

          cp -a "$LOG_DIR"/. "$FAILURE_DIR"/ 2>/dev/null || true
          cp -a "$PROJECT_DIR/Builds/Logs" "$FAILURE_DIR/project-build-logs" 2>/dev/null || true
          cp -a "$PROJECT_DIR/Library/Logs" "$FAILURE_DIR/library-logs" 2>/dev/null || true
          mkdir -p "$FAILURE_DIR/discovered-project-logs"
          find "$PROJECT_DIR" -type f \
            \( -name '*.log' -o -name '*build-report*.txt' -o -name '*build-report*.log' \
               -o -name 'gradle*.txt' -o -name 'build.gradle' -o -name 'settings.gradle' \) \
            -size -20M -print0 2>/dev/null \
            | while IFS= read -r -d '' log_file; do
                relative="${log_file#${PROJECT_DIR}/}"
                target="$FAILURE_DIR/discovered-project-logs/$relative"
                mkdir -p "$(dirname "$target")"
                cp -a "$log_file" "$target" 2>/dev/null || true
              done
          find "$FAILURE_DIR/discovered-project-logs" -type f -printf '%P %s bytes\n' \
            | sort > "$FAILURE_DIR/discovered-project-logs-index.txt" 2>/dev/null || true
          cp -a "$HOME/.local/share/unity3d/Unity/Editor.log" "$FAILURE_DIR/Editor.log" 2>/dev/null || true
          cp -a "$HOME/.local/share/unity3d/Unity/Editor-prev.log" "$FAILURE_DIR/Editor-prev.log" 2>/dev/null || true
          docker ps -a > "$FAILURE_DIR/docker-ps.txt" 2>&1 || true
          docker images > "$FAILURE_DIR/docker-images.txt" 2>&1 || true
          df -h > "$FAILURE_DIR/disk-usage.txt" 2>&1 || true

          {
            echo "workflow_number=$WORKFLOW_NUMBER"
            echo "workflow_signature=$WORKFLOW_SIGNATURE"
            echo "workflow=$GITHUB_WORKFLOW"
            echo "active_workflow_file=${ACTIVE_WORKFLOW_FILE:-unknown}"
            echo "active_workflow_sha256=${ACTIVE_WORKFLOW_SHA256:-unknown}"
            echo "run_id=$GITHUB_RUN_ID"
            echo "run_number=$GITHUB_RUN_NUMBER"
            echo "source_zip=${SOURCE_ZIP:-not-selected}"
            echo "source_version=${SOURCE_VERSION:-unknown}"
            echo "unity_build_outcome=${{ steps.unity_build.outcome }}"
            echo "package_outcome=${{ steps.package.outcome }}"
            echo "cleanup_outcome=${{ steps.cleanup.outcome }}"
            echo "failed_stage=$(cat "$LOG_DIR/current-stage.txt" 2>/dev/null || echo unknown)"
            echo "failed_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > "$FAILURE_DIR/failure-summary.txt"

          python3 - <<'PY'
          import os
          from pathlib import Path

          root = Path('.menchino-ci/failure-bundle')
          protected_values = [
              os.environ.get('UNITY_EMAIL', ''),
              os.environ.get('UNITY_PASSWORD', ''),
              os.environ.get('UNITY_LICENSE', ''),
          ]
          for path in root.rglob('*'):
              if not path.is_file() or path.stat().st_size > 20_000_000:
                  continue
              try:
                  content = path.read_text(encoding='utf-8', errors='replace')
              except OSError:
                  continue
              for value in protected_values:
                  if value:
                      content = content.replace(value, '[REDACTED]')
              path.write_text(content, encoding='utf-8')
          PY

          (cd "$FAILURE_DIR" && zip -q -r "../$(basename "$FAILURE_ZIP")" .)
          test -s "$FAILURE_ZIP"
          unzip -t "$FAILURE_ZIP"

      - name: Upload WF-13 error-log ZIP directly
        if: ${{ always() && (failure() || steps.unity_build.outcome != 'success' || steps.package.outcome != 'success') }}
        uses: actions/upload-artifact@v7
        with:
          path: .menchino-ci/menchino-build-error-logs-wf13-run-${{ github.run_number }}.zip
          archive: false
          if-no-files-found: error
          retention-days: 7

      - name: Mark unsuccessful build as failed
        if: steps.unity_build.outcome != 'success' || steps.package.outcome != 'success'
        shell: bash
        run: |
          echo 'Menchino WF-13 failed. Download the WF-13 error-log ZIP artifact.'
          exit 1
